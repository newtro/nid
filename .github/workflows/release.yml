name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: nid-x86_64-unknown-linux-musl.nidrel
            bin_suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: nid-aarch64-unknown-linux-gnu.nidrel
            bin_suffix: ""
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: nid-x86_64-apple-darwin.nidrel
            bin_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: nid-aarch64-apple-darwin.nidrel
            bin_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nid-x86_64-pc-windows-msvc.nidrel
            bin_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    env:
      NID_TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64-linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      # Build the release binary for the matrix target.
      - name: Build target binary
        run: cargo build --release --bin nid --target ${{ matrix.target }}

      # Build the packaging helper for the HOST (not --target), so it runs in CI.
      - name: Build host packager
        run: cargo build --release --bin nid-package

      - name: Pack signed release tarball (*nix)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          NID_RELEASE_SIGNING_KEY: ${{ secrets.NID_RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          if [ -z "$VERSION" ]; then VERSION="0.0.0-unknown"; fi
          BIN="target/${{ matrix.target }}/release/nid${{ matrix.bin_suffix }}"
          PACKAGER="target/release/nid-package${{ matrix.bin_suffix }}"
          test -f "$BIN"
          test -f "$PACKAGER"
          "$PACKAGER" \
            --binary "$BIN" \
            --version "$VERSION" \
            --target "${{ matrix.target }}" \
            --output "${{ matrix.artifact }}" \
            --signing-key-hex "$NID_RELEASE_SIGNING_KEY"

      - name: Pack signed release tarball (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          NID_RELEASE_SIGNING_KEY: ${{ secrets.NID_RELEASE_SIGNING_KEY }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          $Version = $env:GITHUB_REF_NAME -replace '^v',''
          if (-not $Version -or $Version -eq $env:GITHUB_REF_NAME) {
            $InputTag = if ($env:INPUT_TAG) { $env:INPUT_TAG } else { "0.0.0-unknown" }
            $Version  = $InputTag -replace '^v',''
          }
          $Bin     = "target/${{ matrix.target }}/release/nid.exe"
          $Packer  = "target/release/nid-package.exe"
          & $Packer `
            --binary $Bin `
            --version $Version `
            --target "${{ matrix.target }}" `
            --output "${{ matrix.artifact }}" `
            --signing-key-hex $env:NID_RELEASE_SIGNING_KEY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          files: dist/**/*.nidrel
          draft: true
          generate_release_notes: true
