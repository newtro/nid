name: release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Explicit tag (e.g. v0.1.0). Leave blank for a rolling main release.'
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate release on CI passing. Duplicates ci.yml checks so a direct push
  # to main still has a guard before the artifacts go out.
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets

  # Compute release metadata once so every matrix build agrees on tag +
  # version + whether this is a prerelease.
  metadata:
    name: metadata
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            PRERELEASE=false
            MAKE_LATEST=true
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            VERSION="${TAG#v}"
            PRERELEASE=false
            MAKE_LATEST=true
          else
            # Push to main → rolling pre-release tagged `main`, overwritten
            # each push. `nid update --channel main` pulls from this.
            SHA_SHORT="$(git rev-parse --short "${GITHUB_SHA}")"
            TAG="main"
            VERSION="0.0.0-main.${SHA_SHORT}"
            PRERELEASE=true
            MAKE_LATEST=false
          fi
          {
            echo "release_tag=${TAG}"
            echo "version=${VERSION}"
            echo "is_prerelease=${PRERELEASE}"
            echo "make_latest=${MAKE_LATEST}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.target }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: nid-x86_64-unknown-linux-musl.nidrel
            bin_suffix: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: nid-aarch64-unknown-linux-gnu.nidrel
            bin_suffix: ""
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: nid-x86_64-apple-darwin.nidrel
            bin_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: nid-aarch64-apple-darwin.nidrel
            bin_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nid-x86_64-pc-windows-msvc.nidrel
            bin_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    env:
      NID_TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64-linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary (target)
        run: cargo build --release --bin nid --target ${{ matrix.target }}

      - name: Build packager (host)
        run: cargo build --release --bin nid-package

      - name: Check signing key is present
        shell: bash
        env:
          KEY: ${{ secrets.NID_RELEASE_SIGNING_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::NID_RELEASE_SIGNING_KEY secret is not set. Add the repo secret before pushing a release. Generate a key with: cargo run --release --bin nid-keygen > private-key.hex"
            exit 1
          fi

      - name: Pack signed release tarball (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          NID_RELEASE_SIGNING_KEY: ${{ secrets.NID_RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/nid${{ matrix.bin_suffix }}"
          PACKAGER="target/release/nid-package${{ matrix.bin_suffix }}"
          "$PACKAGER" \
            --binary "$BIN" \
            --version "${{ needs.metadata.outputs.version }}" \
            --target "${{ matrix.target }}" \
            --output "${{ matrix.artifact }}" \
            --signing-key-hex "$NID_RELEASE_SIGNING_KEY"

      - name: Pack signed release tarball (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          NID_RELEASE_SIGNING_KEY: ${{ secrets.NID_RELEASE_SIGNING_KEY }}
        run: |
          $Bin    = "target/${{ matrix.target }}/release/nid.exe"
          $Packer = "target/release/nid-package.exe"
          & $Packer `
            --binary $Bin `
            --version "${{ needs.metadata.outputs.version }}" `
            --target "${{ matrix.target }}" `
            --output "${{ matrix.artifact }}" `
            --signing-key-hex $env:NID_RELEASE_SIGNING_KEY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      # For rolling-main releases we need to force-move the `main` tag to
      # the current commit; `softprops/action-gh-release` handles creating
      # the tag if it doesn't exist, but for an existing moving tag we
      # delete+recreate the release first to keep it clean.
      - name: Delete existing rolling release (main-channel only)
        if: needs.metadata.outputs.release_tag == 'main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete main --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: >-
            ${{ needs.metadata.outputs.release_tag == 'main'
                && format('main @ {0}', needs.metadata.outputs.version)
                || needs.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: dist/**/*.nidrel
          draft: false
          prerelease: ${{ needs.metadata.outputs.is_prerelease }}
          make_latest: ${{ needs.metadata.outputs.make_latest }}
          generate_release_notes: true
          body: |
            Built from commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            ### Install
            ```
            nid update --from <downloaded>.nidrel
            ```

            ### Verify
            Each `.nidrel` tarball is ed25519-signed. Verification is
            enforced against the anchor key baked into every `nid` binary
            at build time. See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md#releases--signing).
