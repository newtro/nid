# npm install — keep warnings, errors, audit summary; drop progress lines.
[meta]
fingerprint = "npm install"
version = "1.0.0"
schema = "1.0"
format_claim = "plain"
description = "Preserve npm warn/err/audit output; drop progress counters."

[[rules]]
kind = "strip_ansi"

[[rules]]
kind = "keep_lines"
match = '^(npm (warn|WARN|ERR!|err!|notice)|added [0-9]+|changed [0-9]+|removed [0-9]+|[0-9]+ (high|critical|moderate|low) severity|found [0-9]+ vulnerabilit)'

[[invariants]]
name = "ErrorLinesPreserved"
check = "all_matching_preserved"
pattern = "(?i)ERR!|npm err"
