# az webapp log tail — drop DEBUG/TRACE log lines; preserve INFO/WARN/ERROR.
[meta]
fingerprint = "az webapp log tail"
version = "1.1.0"
schema = "1.0"
format_claim = "log"
description = "Azure webapp streaming log — keep signal levels, drop DEBUG."

[[rules]]
kind = "strip_ansi"

[[rules]]
kind = "drop_lines"
match = '\s(DEBUG|TRACE|VERBOSE)\s'

[[rules]]
kind = "dedup"
