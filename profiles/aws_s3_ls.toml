# aws s3 ls — strip AWS CLI warnings + blank lines; dedup.
[meta]
fingerprint = "aws s3 ls"
version = "1.1.0"
schema = "1.0"
format_claim = "tabular"
description = "Drop AWS CLI warnings; keep bucket/object listing."

[[rules]]
kind = "strip_ansi"

[[rules]]
kind = "drop_lines"
match = '^(A newer version|Upgrade to|aws:.*warning|\s*$)'

[[rules]]
kind = "dedup"
