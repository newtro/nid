# git branch -a — keep branch lines; drop HEAD-arrow metadata
# (redundant with origin/<default>); strip ANSI + dedup.
[meta]
fingerprint = "git branch -a"
version = "1.1.0"
schema = "1.0"
format_claim = "plain"
description = "Keep branch names; drop redundant HEAD pointer."

[[rules]]
kind = "strip_ansi"

# Drop the `remotes/origin/HEAD -> origin/<default>` line. The default branch
# is usually listed separately on the next line, so this is redundant.
[[rules]]
kind = "drop_lines"
match = '^\s+remotes/\S+/HEAD\s+->\s'

[[rules]]
kind = "keep_lines"
match = '^(\*?\s+\S|\s+remotes/)'

[[rules]]
kind = "dedup"
